name: crop_disease_app
description: CropAI – Crop Disease Detection App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.0
  http_parser: ^4.0.2
  mime: ^1.0.5

  # Image
  image_picker: ^1.1.2

  # Fonts & animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Charts
  fl_chart: ^0.69.0

  # Storage
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
